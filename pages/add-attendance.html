<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendyn - Add Attendance</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 280px;
            --bg-light: #F8F8FF;
            --sidebar-bg: #FFFFFF;
            --active-item-bg: #F5F3FF;
            --active-item-text: #5E5CE6;
            --brand-purple: #7B61FF;
            --brand-blue: #5B6CFF;
            --text-heading: #1A1C3E;
            --text-sub: #545470;
            --btn-purple: #5E5CE6;
        }

        body {
            background-color: #F0F2FF;
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-heading);
            overflow-x: hidden;
        }

        .dashboard-container {
            display: flex;
            padding: 24px;
            gap: 24px;
            min-height: 100vh;
            background-color: #F0F2FF;
            box-sizing: border-box;
        }

        /* Sidebar Styling */
        .sidebar { 
            border: none; 
            background: white; 
            border-radius: 28px;
            height: calc(100vh - 48px);
            position: sticky;
            top: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            z-index: 100;
            width: 250px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 3rem;
            padding-left: 0.75rem;
        }

        .logo-icon {
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            background: transparent;
            border-radius: 14px;
        }

        .logo-icon img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .logo-text { font-size: 1.25rem; font-weight: 800; color: #1A1C3E; }

        .nav-group { margin-bottom: 2rem; }
        .nav-group-title { font-size: 0.75rem; font-weight: 700; color: #A0AABF; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; padding-left: 0.75rem; }

        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 0.875rem 1rem; border-radius: 12px;
            color: #545470; font-weight: 600; cursor: pointer;
            transition: all 0.2s; margin-bottom: 4px; text-decoration: none;
        }
        .nav-item:hover { background: #FAFAFB; color: #1A1C3E; }
        .nav-item.active { 
            background: #5B6CFF; 
            color: white; 
            box-shadow: 0 8px 20px rgba(91, 108, 255, 0.25);
        }
        .nav-item svg { width: 22px; height: 22px; }
        
        .nav-item.logout { color: #FF4D4F; margin-top: auto; }
        .nav-item.logout:hover { background: #FFF5F5; color: #FF2D2D; }
        .nav-item svg { width: 22px; height: 22px; }
        
        .add-attendance-sidebar-icon {
            width: 24px; height: 24px;
            background: #5B6CFF;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; margin-right: 0;
            transition: all 0.2s;
        }

        .nav-item.active .add-attendance-sidebar-icon {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            background: white;
            border-radius: 28px;
            height: calc(100vh - 48px);
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .scroll-content {
            padding: 2.5rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .scroll-content::-webkit-scrollbar { width: 6px; }
        .scroll-content::-webkit-scrollbar-track { background: transparent; }
        .scroll-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.05); border-radius: 10px; }
        .scroll-content::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.1); }

        .page-card {
            background: white; 
            border-radius: 28px; 
            padding: 2rem; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
            border: 1px solid #F1F3F9; 
            margin-bottom: 2rem;
        }

        .card-label {
            font-size: 0.85rem; 
            font-weight: 700; 
            color: #8B8B97; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            margin-bottom: 1.5rem; 
            display: block;
        }

        .picker-wrapper {
            position: relative; 
            background: #F8F9FF; 
            border-radius: 14px; 
            height: 60px; 
            display: flex; 
            align-items: center; 
            padding: 0 1.25rem; 
            border: 1px solid #E5E7EB;
        }

        .subject-select {
            width: 100%; 
            height: 100%; 
            background: transparent; 
            border: none; 
            font-weight: 700; 
            color: #1A1C3E; 
            font-size: 1.1rem; 
            outline: none; 
            cursor: pointer; 
            appearance: none;
        }

        .toggle-grid {
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 1.5rem;
        }

        .attendance-btn {
            height: 120px;
            border-radius: 24px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            background: #F9FAFB;
        }

        .attendance-btn:hover:not(.active) {
            transform: translateY(-3px);
            border-color: #E5E7EB;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            background: white;
        }

        .attendance-btn.active {
            transform: scale(0.98);
        }

        .btn-icon {
            width: 40px; 
            height: 40px; 
            color: #D1D5DB; 
            margin-bottom: 10px;
        }

        .btn-label {
            font-weight: 800; 
            font-size: 1.1rem; 
            color: #A0AABF;
        }

        /* Active States */
        .attendance-btn.active.present {
            background: #E8F9EE;
            border-color: #22C55E;
        }
        .attendance-btn.active.present .btn-icon,
        .attendance-btn.active.present .btn-label {
            color: #22C55E;
        }

        .attendance-btn.active.absent {
            background: #FEE2E2;
            border-color: #EF4444;
        }
        .attendance-btn.active.absent .btn-icon,
        .attendance-btn.active.absent .btn-label {
            color: #EF4444;
        }

        .save-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            max-width: 400px;
            margin: 2.5rem auto 0 auto;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #7B61FF 0%, #5E5CE6 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(94, 92, 230, 0.35);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .save-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .save-btn:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(94, 92, 230, 0.45);
        }

        /* Toast Styling */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1A1C3E;
            color: white;
            padding: 1rem 2rem;
            border-radius: var(--radius-full);
            font-weight: 700;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        /* Bottom Nav for Mobile */
        @media (max-width: 768px) {
            .page-card { padding: 1.5rem; border-radius: 20px; }
            .toggle-grid { gap: 1rem; }
            .attendance-btn { height: 100px; border-radius: 20px; }
            .btn-label { font-size: 1rem; }
            .save-btn { margin-top: 1.5rem; padding: 0.875rem 1.5rem; font-size: 1rem; }
        }
    </style>
</head>
<body>

            </nav>

        <main class="main-content">
            <div class="scroll-content">
                <div class="header-section" style="text-align: left; margin-bottom: 2.5rem;">
                    <h1 class="screen-title" style="font-size: 2.25rem; font-weight: 800; color: #1A1C3E; margin-bottom: 0.5rem;">Add Attendance</h1>
                    <p class="screen-subtitle" id="screenSubtitle" style="color: #6B7280; font-size: 1.1rem;">Mark your attendance for today</p>
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="empty-state" style="display: none; text-align: center; padding: 3rem 1.5rem;">
                    <div class="empty-icon" style="width: 80px; height: 80px; background: #F5F3FF; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto; color: #7B61FF;">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M21,5c-1.11,-0.35 -2.33,-0.5 -3.5,-0.5c-1.95,0 -4.05,0.4 -5.5,1.5c-1.45,-1.1 -3.55,-1.5 -5.5,-1.5S2.45,4.9 1,6v14.65c0,0.25 0.25,0.5 0.5,0.5c0.1,0 0.15,-0.05 0.25,-0.05C3.1,20.45 5.05,20 6.5,20c1.95,0 4.05,0.4 5.5,1.5c1.35,-0.85 3.1,-1.5 5.5,-1.5c1.65,0 3.35,0.3 4.75,1.05c0.1,0.05 0.15,0.05 0.25,0.05c0.25,0 0.5,-0.25 0.5,-0.5V6c-0.6,-0.45 -1.35,-0.75 -2,-1zM21,18.5c-1.1,-0.35 -2.3,-0.5 -3.5,-0.5c-1.7,0 -3.45,0.3 -5,1V7c1.6,-0.7 3.3,-1 5,-1c1.2,0 2.4,0.15 3.5,0.5V18.5z" /></svg>
                    </div>
                    <h2 style="font-size: 1.5rem; font-weight: 800; color: #1A1C3E; margin-bottom: 0.75rem;">No Subjects Found</h2>
                    <p style="color: #545470; font-weight: 600; margin-bottom: 2rem;">Add a subject before marking attendance</p>

                </div>

                <!-- Subject Selection Card -->
                <div class="page-card" id="subjectCard">
                    <span class="card-label">Select Subject</span>
                    <div class="picker-wrapper">
                        <select class="subject-select" id="subject-picker">
                            <option value="" disabled selected>Choose a subject</option>
                            <option value="math">Mathematics</option>
                            <option value="phy">Physics</option>
                            <option value="chem">Chemistry</option>
                        </select>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#545470" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; right: 1.25rem; pointer-events: none;"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                </div>

                <!-- Mark Attendance Card -->

                        </div>

                            <span class="btn-label">Absent</span>
                        </div>

            </div>
            <div class="m-nav-item" onclick="navigateTo('profile.html')">

    <!-- Toast Notification -->

    <script src="../js/app.js"></script>
    <script>
        let selectedStatus = null;
        let subjects = [];

        // Load subjects on startup
        window.onload = function() {
            checkAuth();
            const data = localStorage.getItem('SUBJECTS_DATA');
            if (data && JSON.parse(data).length > 0) {
                subjects = JSON.parse(data);
                const picker = document.getElementById('subject-picker');
                picker.innerHTML = '<option value="" disabled selected>Choose a subject</option>';
                
                subjects.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.id;
                    opt.textContent = s.name;
                    picker.appendChild(opt);
                });

                document.getElementById('subjectCard').style.display = 'block';
                document.getElementById('statusCard').style.display = 'block';
                document.getElementById('save-attendance-btn').style.display = 'flex';
                document.getElementById('emptyState').style.display = 'none';
            } else {
                document.getElementById('subjectCard').style.display = 'none';
                document.getElementById('statusCard').style.display = 'none';
                document.getElementById('save-attendance-btn').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
            }
            
            checkValidation();
        };

        function selectStatus(status) {
            selectedStatus = status;
            document.getElementById('btn-present').classList.remove('active');
            document.getElementById('btn-absent').classList.remove('active');
            
            if (status === 'present') {
                document.getElementById('btn-present').classList.add('active');
            } else {
                document.getElementById('btn-absent').classList.add('active');
            }
            
            checkValidation();
        }

        function checkValidation() {
            const picker = document.getElementById('subject-picker');
            const saveBtn = document.getElementById('save-attendance-btn');
            
            const isSubjectSelected = picker.value !== "";
            const isStatusSelected = selectedStatus !== null;
            
            saveBtn.disabled = !(isSubjectSelected && isStatusSelected);
        }

        // Add change listener to picker
        document.getElementById('subject-picker').addEventListener('change', checkValidation);

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        async function saveAttendance() {
            const picker = document.getElementById('subject-picker');
            const subjectId = picker.value;
            const saveBtn = document.getElementById('save-attendance-btn');
            const token = localStorage.getItem('AUTH_TOKEN');
            
            if (!subjectId || !selectedStatus) return;

            try {
                // Show loading state
                saveBtn.disabled = true;
                const originalText = saveBtn.innerHTML;
                saveBtn.innerText = 'Recording...';
                
                const now = new Date();
                const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                const statusValue = (selectedStatus === 'present' ? 1 : 2);

                const response = await fetch(`${API_BASE_URL}/attendance`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        subject_id: parseInt(subjectId),
                        status: statusValue,
                        date: dateStr
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast("Attendance recorded successfully");
                    
                    // We don't manually update SUBJECTS_DATA here anymore, 
                    // as dashboard.html now fetches fresh data from the backend.
                    
                    setTimeout(() => {
                        navigateTo('dashboard.html');
                    }, 800);
                } else {
                    alert(data.error || 'Failed to record attendance');
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = originalText;
                }
            } catch (error) {
                console.error('Save attendance error:', error);
                alert('Connection error. Please try again.');
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalText;
            }
        }
    </script>
</body>
</html>
