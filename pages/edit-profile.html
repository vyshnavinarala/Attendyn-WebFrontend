<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendyn - Edit Profile</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 250px;
            --bg-light: #F8F8FF;
            --sidebar-bg: #FFFFFF;
            --active-item-bg: #F5F3FF;
            --active-item-text: #5E5CE6;
            --brand-purple: #7B61FF;
            --brand-blue: #5B6CFF;
            --text-heading: #1A1C3E;
            --text-sub: #545470;
            --btn-purple: #5E5CE6;
        }

        body {
            background-color: #F5F3FF; /* Light Lavender Background */
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-heading);
            overflow-x: hidden;
        }

        .dashboard-container {
            display: flex;
            padding: 24px;
            gap: 24px;
            min-height: 100vh;
            background-color: #F5F3FF; /* Light Lavender Background */
            box-sizing: border-box;
        }

        /* Main Content */

        /* Main Content */
        .main-content {
            flex: 1;
            background: #F5F3FF; /* Light Lavender Background */
            height: calc(100vh - 48px);
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
        }

        .content-header {
            padding: 3rem 2.5rem 1.5rem 2.5rem;
            background: #F8F9FF;
            border-bottom: 1px solid #F1F3F9;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1A1C3E;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .back-btn:hover {
            transform: translateX(-3px);
            background: #FAFAFB;
        }

        .screen-title { font-size: 2rem; font-weight: 800; color: #1A1C3E; margin: 0; }

        .content-body {
            padding: 2.5rem;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* Form Card */
        .form-card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border: 1px solid #F1F3F9;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            color: #545470;
            margin-bottom: 0.75rem;
        }

        .input-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #B0B0C4;
        }

        .form-input {
            width: 100%;
            height: 56px;
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 16px;
            padding: 0 16px 0 48px;
            font-family: inherit;
            font-size: 1rem;
            color: #1A1C3E;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--brand-blue);
            background: white;
            box-shadow: 0 0 0 4px rgba(91, 108, 255, 0.1);
        }

        .form-input.read-only {
            background: #F3F4F6;
            color: #9CA3AF;
            cursor: not-allowed;
        }

        .form-actions {
            display: flex;
            gap: 16px;
            margin-top: 2rem;
        }

        .btn {
            flex: 1;
            height: 56px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            font-family: inherit;
        }

        .btn-cancel {
            background: #F3F4F6;
            color: #545470;
        }
        .btn-cancel:hover {
            background: #E5E7EB;
        }

        .btn-save {
            background: linear-gradient(135deg, #7B61FF 0%, #5B6CFF 100%);
            color: white;
            box-shadow: 0 8px 16px rgba(91, 108, 255, 0.2);
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(91, 108, 255, 0.3);
        }

        /* Profile Image Section */
        .profile-image-section {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            margin-top: -1rem; /* Adjusting for padding */
        }

        .avatar-wrapper {
            position: relative;
            cursor: pointer;
        }

        .avatar-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #E9ECF8;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: all 0.2s;
        }

        .avatar-container:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }

        .avatar-container svg {
            width: 50%;
            height: 50%;
            color: #5E5CE6;
        }

        .camera-badge {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 36px;
            height: 36px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            color: #5E5CE6;
            border: 1px solid #F1F3F9;
            transition: all 0.2s;
        }

        .avatar-wrapper:hover .camera-badge {
            transform: scale(1.1);
            background: #F8F9FF;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .dashboard-container { padding: 0; }
            .main-content { height: 100vh; border-radius: 0; }
            .content-header { padding: 2rem 1.5rem 1rem 1.5rem; }
            .content-body { padding: 1.5rem; }
            .form-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo-icon">
                    <img src="../assets/logo.png" alt="Attendyn Logo">
                </div>
                <span class="logo-text">Attendyn</span>
            </div>
            
            <nav class="nav-group">
                <div class="nav-group-title">Menu</div>
                <a href="javascript:void(0)" onclick="navigateTo('dashboard.html')" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <span>Home</span>
                </a>
                <a href="javascript:void(0)" onclick="navigateTo('calendar.html')" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    <span>Calendar</span>
                </a>
                <a href="javascript:void(0)" onclick="navigateTo('analysis.html')" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    <span>Analysis</span>
                </a>
                <a href="javascript:void(0)" onclick="navigateTo('add-attendance.html')" class="nav-item">
                    <div class="add-attendance-sidebar-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </div>
                    <span>Add Attendance</span>
                </a>
            </nav>

            <nav class="nav-group" style="margin-top: auto;">
                <div class="nav-group-title">Support</div>
                <a href="javascript:void(0)" onclick="navigateTo('profile.html')" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span>Profile</span>
                </a>
                <a href="javascript:void(0)" onclick="logout()" class="nav-item logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <button class="back-btn" onclick="navigateTo('profile.html')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <h1 class="screen-title">Edit Profile</h1>
            </header>

            <div class="content-body">
                <div class="profile-image-section">
                    <input type="file" id="profile-upload-input" accept="image/*" style="display: none;">
                    <div class="avatar-wrapper" onclick="document.getElementById('profile-upload-input').click()">
                        <div class="avatar-container" id="avatar-preview">
                            <svg id="default-avatar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <div class="camera-badge">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                                <circle cx="12" cy="13" r="4"></circle>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="form-card">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <div class="input-container">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            <input type="text" id="username-input" class="form-input" placeholder="Enter your name">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-container">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            <input type="email" id="email-input" class="form-input read-only" readonly value="user@example.com">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button class="btn btn-cancel" onclick="navigateTo('profile.html')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            Cancel
                        </button>
                        <button class="btn btn-save" onclick="saveProfile()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            Save Changes
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/app.js"></script>
    <script>
        let selectedFile = null;
        let selectedImageData = null;

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            const userName = localStorage.getItem('USER_NAME') || 'User';
            document.getElementById('username-input').value = userName;
            
            // Mock email/display email
            const userEmail = localStorage.getItem('USER_EMAIL') || 'user@example.com';
            document.getElementById('email-input').value = userEmail;

            // Load existing profile photo
            const savedPhoto = localStorage.getItem('USER_PHOTO');
            if (savedPhoto) {
                updateAvatarPreview(savedPhoto);
                selectedImageData = savedPhoto;
            }

            // Handle file selection
            const fileInput = document.getElementById('profile-upload-input');
            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    selectedFile = file;
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        selectedImageData = event.target.result;
                        updateAvatarPreview(selectedImageData);
                    };
                    reader.readAsDataURL(file);
                }
            });
        });

        function updateAvatarPreview(dataUrl) {
            const container = document.getElementById('avatar-preview');
            container.innerHTML = `<img src="${dataUrl}" style="width: 100%; height: 100%; object-fit: cover;">`;
        }

        async function saveProfile() {
            const newName = document.getElementById('username-input').value.trim();
            if (!newName) {
                alert('Please enter a valid name.');
                return;
            }

            const token = localStorage.getItem('AUTH_TOKEN');
            const submitBtn = document.querySelector('.btn-save');
            
            try {
                // Show loading state
                submitBtn.disabled = true;
                submitBtn.innerText = 'Saving...';
                
                // 1. Update Name
                const nameResponse = await fetch(`${API_BASE_URL}/user/name`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ name: newName })
                });
                
                if (!nameResponse.ok) {
                    const nameData = await nameResponse.json();
                    throw new Error(nameData.error || 'Failed to update name');
                }

                localStorage.setItem('USER_NAME', newName);

                // 2. Upload Photo if selected
                if (selectedFile) {
                    const formData = new FormData();
                    formData.append('photo', selectedFile);

                    const photoResponse = await fetch(`${API_BASE_URL}/user/photo`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });

                    if (photoResponse.ok) {
                        const photoData = await photoResponse.json();
                        // Store the data URL locally for immediate usage elsewhere
                        if (selectedImageData) {
                            localStorage.setItem('USER_PHOTO', selectedImageData);
                        }
                    } else {
                        const photoData = await photoResponse.json();
                        alert('Name updated, but photo upload failed: ' + (photoData.error || 'Unknown error'));
                    }
                }

                alert('Profile updated successfully!');
                navigateTo('profile.html');
                
            } catch (error) {
                console.error('Update profile error:', error);
                alert('Error: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg> Save Changes`;
            }
        }
    </script>
</body>
</html>
