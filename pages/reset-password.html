<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendyn - Reset Password</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <style>
        .forgot-bg {
            background: #F5F3FF; /* Light Lavender Background */
            min-height: 100vh;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .back-btn {
            align-self: flex-start;
            background: transparent;
            border: none;
            color: #545470;
            cursor: pointer;
            padding: 8px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background-color: var(--bg-surface);
            box-shadow: var(--shadow-sm);
        }

        .header-text {
            color: #0D0D26;
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
            text-align: center;
        }

        .sub-text {
            color: #545470;
            font-size: 0.9375rem;
            opacity: 0.8;
            margin: 0 auto 1.25rem auto;
            text-align: center;
            max-width: 280px;
            line-height: 1.4;
        }

        .main-card {
            background: var(--bg-surface);
            border-radius: 28px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            padding: 5rem 2rem;
        }

        @media (max-width: 480px) {
            .main-card {
                padding: 1.5rem;
                border-radius: 24px;
            }
            .header-text {
                font-size: 1.5rem;
            }
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: #F8F8FF;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            transition: all 0.2s;
        }
        
        .input-wrapper:focus-within {
            border-color: var(--brand-purple);
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(123, 97, 255, 0.1);
        }

        .input-icon {
            padding-left: 1rem;
            color: #545470;
            display: flex;
            align-items: center;
        }

        .login-input {
            width: 100%;
            padding: 1rem 1rem 1rem 0.75rem;
            border: none;
            background: transparent;
            font-size: 1rem;
            color: #0D0D26;
            outline: none;
        }

        .password-toggle {
            padding: 0 1rem;
            cursor: pointer;
            color: #545470;
            display: flex;
            align-items: center;
        }

        .illustration {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem auto;
            background: linear-gradient(to right, #9B66FF, #5C8DFF);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 8px 24px rgba(123, 97, 255, 0.2);
        }

        .illustration svg {
            width: 40px;
            height: 40px;
        }

        .reset-header.inside-card {
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="forgot-bg">
            <div class="main-card">
                <div class="illustration">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18,8h-1L17,6c0,-2.76 -2.24,-5 -5,-5L12,1c-2.76,0 -5,2.24 -5,5v2L6,8c-1.1,0 -2,0.9 -2,2v10c0,1.1 0.9,2 2,2h12c1.1,0 2,-0.9 2,-2L20,10c0,-1.1 -0.9,-2 -2,-2zM9,6c0,-1.66 1.34,-3 3,-3s3,1.34 3,3v2L9,8L9,6zM18,20L6,20L6,10h12v10zM12,13c-1.1,0 -2,0.9 -2,2s0.9,2 2,2 2,-0.9 2,-2 -0.9,-2 -2,-2z" />
                    </svg>
                </div>

                <div class="reset-header inside-card">
                    <h1 class="header-text">Reset Password</h1>
                    <p class="sub-text">Please enter your new password below to reset.</p>
                </div>

                <form id="resetForm" onsubmit="handleReset(event)">
                    <div class="input-group">
                        <label class="form-label">New Password</label>
                        <div class="input-wrapper">
                            <div class="input-icon">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:20px;height:20px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            </div>
                            <input type="password" id="newPasswordInput" class="login-input" placeholder="Enter new password" required>
                            <div class="password-toggle" onclick="togglePassword('newPasswordInput', 'eyeIcon1')">
                                <svg id="eyeIcon1" fill="none" stroke="var(--brand-purple)" viewBox="0 0 24 24" style="width:22px;height:22px;stroke-width:2.5;">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-wrapper">
                            <div class="input-icon">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:20px;height:20px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            </div>
                            <input type="password" id="confirmPasswordInput" class="login-input" placeholder="Confirm your password" required>
                            <div class="password-toggle" onclick="togglePassword('confirmPasswordInput', 'eyeIcon2')">
                                <svg id="eyeIcon2" fill="none" stroke="var(--brand-purple)" viewBox="0 0 24 24" style="width:22px;height:22px;stroke-width:2.5;">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="margin-top: 16px;">Update Password</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const eyeIcon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`;
            } else {
                input.type = 'password';
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
            }
        }

        async function handleReset(e) {
            e.preventDefault();
            
            const new_password = document.getElementById('newPasswordInput').value;
            const confirm = document.getElementById('confirmPasswordInput').value;
            const email = localStorage.getItem('RESET_EMAIL');
            
            if (!email) {
                alert("Session expired. Please start over.");
                navigateTo('forgot-password.html');
                return;
            }
            
            if (new_password !== confirm) {
                alert("Passwords do not match");
                return;
            }

            // Password complexity validation
            if (new_password.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }
            if (!/[A-Z]/.test(new_password)) {
                alert("Password must contain at least one uppercase letter.");
                return;
            }
            if (!/[0-9]/.test(new_password)) {
                alert("Password must contain at least one number.");
                return;
            }
            if (!/[^A-Za-z0-9]/.test(new_password)) {
                alert("Password must contain at least one special character.");
                return;
            }
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            try {
                submitBtn.disabled = true;
                submitBtn.innerText = 'Updating...';
                
                const response = await fetch(`${API_BASE_URL}/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, new_password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Clear the reset email from storage
                    localStorage.removeItem('RESET_EMAIL');
                    navigateTo('account-success.html');
                } else {
                    alert(data.error || 'Failed to reset password. Please try again.');
                }
            } catch (error) {
                console.error('Reset error:', error);
                alert('Connection error. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Update Password';
            }
        }
    </script>
</body>
</html>
