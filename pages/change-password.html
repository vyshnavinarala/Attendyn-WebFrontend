<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendyn - Change Password</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 250px;
            --bg-light: #F8F8FF;
            --sidebar-bg: #FFFFFF;
            --active-item-bg: #F5F3FF;
            --active-item-text: #5E5CE6;
            --brand-purple: #7B61FF;
            --brand-blue: #5B6CFF;
            --text-heading: #1A1C3E;
            --text-sub: #545470;
            --btn-purple: #5E5CE6;
        }

        body {
            background-color: #F5F3FF; /* Light Lavender Background */
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-heading);
            overflow-x: hidden;
        }

        .dashboard-container {
            display: flex;
            padding: 24px;
            gap: 24px;
            min-height: 100vh;
            background-color: #F5F3FF; /* Light Lavender Background */
            box-sizing: border-box;
        }

        /* Main Content */

        /* Main Content */
        .main-content {
            flex: 1;
            background: #F5F3FF; /* Light Lavender Background */
            height: calc(100vh - 48px);
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
        }

        .content-header {
            padding: 3rem 2.5rem 1.5rem 2.5rem;
            background: #F8F9FF;
            border-bottom: 1px solid #F1F3F9;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1A1C3E;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .back-btn:hover {
            transform: translateX(-3px);
            background: #FAFAFB;
        }

        .screen-title { font-size: 2rem; font-weight: 800; color: #1A1C3E; margin: 0; }

        .content-body {
            padding: 2rem 2.5rem;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* Form Card */
        .form-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border: 1px solid #F1F3F9;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            color: #545470;
            margin-bottom: 0.75rem;
        }

        .input-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: #B0B0C4;
        }

        .eye-toggle {
            position: absolute;
            right: 16px;
            color: #B0B0C4;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }
        .eye-toggle:hover { color: var(--brand-blue); }

        .form-input {
            width: 100%;
            height: 56px;
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 16px;
            padding: 0 48px 0 48px;
            font-family: inherit;
            font-size: 1rem;
            color: #1A1C3E;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--brand-blue);
            background: white;
            box-shadow: 0 0 0 4px rgba(91, 108, 255, 0.1);
        }

        /* Tips Card */
        .tips-card {
            background: #F3F0FF;
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid #E9E1FF;
            margin-bottom: 2rem;
        }

        .tips-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1rem;
        }

        .tips-badge {
            width: 32px;
            height: 32px;
            background: #7C3AED;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .tips-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: #111827;
        }

        .tip-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            color: #6B7280;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .tip-item:last-child { margin-bottom: 0; }

        .tip-icon {
            width: 16px;
            height: 16px;
            color: #9CA3AF;
        }

        .tip-item.valid { color: #10B981; }
        .tip-item.valid .tip-icon { color: #10B981; }

        .form-actions {
            display: flex;
            gap: 16px;
            margin-top: 1rem;
        }

        .btn {
            flex: 1;
            height: 56px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            font-family: inherit;
        }

        .btn-cancel {
            background: #F3F4F6;
            color: #545470;
        }
        .btn-cancel:hover {
            background: #E5E7EB;
        }

        .btn-save {
            background: linear-gradient(135deg, #7B61FF 0%, #5B6CFF 100%);
            color: white;
            box-shadow: 0 8px 16px rgba(91, 108, 255, 0.2);
            flex: 1.3;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(91, 108, 255, 0.3);
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .dashboard-container { padding: 0; }
            .main-content { height: 100vh; border-radius: 0; }
            .content-header { padding: 2rem 1.5rem 1rem 1.5rem; }
            .content-body { padding: 1.5rem; }
            .form-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo-icon">
                    <img src="../assets/logo.png" alt="Attendyn Logo">
                </div>
                <span class="logo-text">Attendyn</span>
            </div>
            
            <nav class="nav-group">
                <div class="nav-group-title">Menu</div>
                <a href="javascript:void(0)" onclick="navigateTo('dashboard.html')" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <span>Home</span>
                </a>
                <a href="javascript:void(0)" onclick="navigateTo('calendar.html')" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    <span>Calendar</span>
                </a>
                <a href="javascript:void(0)" onclick="navigateTo('analysis.html')" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    <span>Analysis</span>
                </a>
                <a href="javascript:void(0)" onclick="navigateTo('add-attendance.html')" class="nav-item">
                    <div class="add-attendance-sidebar-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </div>
                    <span>Add Attendance</span>
                </a>
            </nav>

            <nav class="nav-group" style="margin-top: auto;">
                <div class="nav-group-title">Support</div>
                <a href="javascript:void(0)" onclick="navigateTo('profile.html')" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span>Profile</span>
                </a>
                <a href="javascript:void(0)" onclick="logout()" class="nav-item logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <button class="back-btn" onclick="navigateTo('profile.html')">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <h1 class="screen-title">Change Password</h1>
            </header>

            <div class="content-body">
                <div class="form-card">
                    <div class="form-group">
                        <label class="form-label">Current Password</label>
                        <div class="input-container">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            <input type="password" id="current-password" class="form-input" placeholder="Enter current password">
                            <svg class="eye-toggle" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="togglePassword('current-password', this)"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <div class="input-container">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            <input type="password" id="new-password" class="form-input" placeholder="Enter new password" oninput="validatePassword()">
                            <svg class="eye-toggle" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="togglePassword('new-password', this)"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-container">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            <input type="password" id="confirm-password" class="form-input" placeholder="Confirm new password">
                            <svg class="eye-toggle" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="togglePassword('confirm-password', this)"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </div>
                    </div>
                </div>

                <div class="tips-card">
                    <div class="tips-header">
                        <div class="tips-badge">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        </div>
                        <span class="tips-title">Security Tips</span>
                    </div>
                    
                    <div class="tip-item" id="tip-length">
                        <svg class="tip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        <span>At least 6 characters</span>
                    </div>
                    <div class="tip-item" id="tip-upper">
                        <svg class="tip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        <span>Contains uppercase letter (A-Z)</span>
                    </div>
                    <div class="tip-item" id="tip-lower">
                        <svg class="tip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        <span>Contains lowercase letter (a-z)</span>
                    </div>
                    <div class="tip-item" id="tip-special">
                        <svg class="tip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        <span>Contains special character (!@#$%...)</span>
                    </div>
                    <div class="tip-item" id="tip-number">
                        <svg class="tip-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        <span>Contains a number (0-9)</span>
                    </div>
                </div>

                <div class="form-actions">
                    <button class="btn btn-cancel" onclick="navigateTo('profile.html')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        Cancel
                    </button>
                    <button class="btn btn-save" onclick="updatePassword()">
                        Update Password
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/app.js"></script>
    <script>
        function togglePassword(inputId, eyeIcon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = 'password';
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        function validatePassword() {
            const password = document.getElementById('new-password').value;
            
            // Check length
            updateRequirement('tip-length', password.length >= 6);
            
            // Check uppercase
            updateRequirement('tip-upper', /[A-Z]/.test(password));
            
            // Check lowercase
            updateRequirement('tip-lower', /[a-z]/.test(password));
            
            // Check special
            updateRequirement('tip-special', /[^A-Za-z0-9]/.test(password));

            // Check number
            updateRequirement('tip-number', /[0-9]/.test(password));
        }

        function updateRequirement(id, isValid) {
            const element = document.getElementById(id);
            if (isValid) {
                element.classList.add('valid');
            } else {
                element.classList.remove('valid');
            }
        }

        async function updatePassword() {
            const current = document.getElementById('current-password').value;
            const res = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (!current || !res || !confirm) {
                alert('Please fill in all fields.');
                return;
            }

            if (res !== confirm) {
                alert('New passwords do not match.');
                return;
            }

            // Client-side requirement check (mirroring UI tips)
            if (res.length < 6 || !/[A-Z]/.test(res) || !/[a-z]/.test(res) || !/[^A-Za-z0-9]/.test(res) || !/[0-9]/.test(res)) {
                alert('Password does not meet the security requirements.');
                return;
            }

            const token = localStorage.getItem('AUTH_TOKEN');
            const submitBtn = document.querySelector('.btn-save');
            
            try {
                // Show loading state
                submitBtn.disabled = true;
                submitBtn.innerText = 'Updating...';
                
                const response = await fetch(`${API_BASE_URL}/user/password`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ 
                        old_password: current, 
                        new_password: res 
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Password updated successfully!');
                    navigateTo('profile.html');
                } else {
                    alert(data.error || 'Failed to update password.');
                }
            } catch (error) {
                console.error('Update password error:', error);
                alert('Connection error. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Update Password';
            }
        }
    </script>
</body>
</html>
