<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendyn - Forgot Password</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
    <style>
        .forgot-bg {
            background: #F5F3FF; /* Light Lavender Background */
            min-height: 100vh;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }


        .header-text {
            color: #0D0D26;
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .sub-text {
            color: #545470;
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 2rem;
            text-align: center;
            max-width: 300px;
        }

        .main-card {
            background: var(--bg-surface);
            border-radius: 28px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 350px;
            padding: 5rem 2rem;
        }

        @media (max-width: 480px) {
            .main-card {
                padding: 1.5rem;
                border-radius: 24px;
            }

            .header-text {
                font-size: 1.5rem;
            }
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: #F8F8FF;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--brand-purple);
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(123, 97, 255, 0.1);
        }

        .input-icon {
            padding-left: 1rem;
            color: #545470;
            display: flex;
            align-items: center;
        }

        .form-input-box {
            width: 100%;
            padding: 1rem 1rem 1rem 0.75rem;
            border: none;
            background: transparent;
            font-size: 1rem;
            color: #0D0D26;
            outline: none;
        }

        .illustration {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem auto;
            background: linear-gradient(to right, #9B66FF, #5C8DFF);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 8px 24px rgba(123, 97, 255, 0.2);
        }

        .illustration svg {
            width: 40px;
            height: 40px;
        }

        .forgot-header.inside-card {
            margin-bottom: 1rem;
        }

        .header-text {
            color: #0D0D26;
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-align: center;
        }

        .sub-text {
            color: #545470;
            font-size: 0.9375rem;
            opacity: 0.8;
            margin: 0 auto 1.25rem auto;
            text-align: center;
            max-width: 280px;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="forgot-bg">
            <div class="main-card">
                <div class="illustration">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M18,8h-1L17,6c0,-2.76 -2.24,-5 -5,-5L12,1c-2.76,0 -5,2.24 -5,5v2L6,8c-1.1,0 -2,0.9 -2,2v10c0,1.1 0.9,2 2,2h12c1.1,0 2,-0.9 2,-2L20,10c0,-1.1 -0.9,-2 -2,-2zM9,6c0,-1.66 1.34,-3 3,-3s3,1.34 3,3v2L9,8L9,6zM18,20L6,20L6,10h12v10zM12,13c-1.1,0 -2,0.9 -2,2s0.9,2 2,2 2,-0.9 2,-2 -0.9,-2 -2,-2z" />
                    </svg>
                </div>

                <div class="forgot-header inside-card">
                    <h1 class="header-text">Forgot Password</h1>
                    <p class="sub-text">Enter your email address to receive an OTP to reset your password.</p>
                </div>

                <form onsubmit="handleForgot(event)">
                    <div class="input-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <div class="input-icon">
                                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                                    </path>
                                </svg>
                            </div>
                            <input type="email" id="emailInput" class="form-input-box" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">Send OTP</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        async function handleForgot(e) {
            e.preventDefault();
            
            const email = document.getElementById('emailInput').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            try {
                // Show loading state
                submitBtn.disabled = true;
                submitBtn.innerText = 'Sending OTP...';
                
                const response = await fetch(`${API_BASE_URL}/forgot-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store email for subsequent steps
                    localStorage.setItem('RESET_EMAIL', email);
                    
                    // Redirect to OTP verification
                    navigateTo('otp-verification.html');
                } else {
                    alert(data.error || 'Failed to send OTP. Please try again.');
                }
            } catch (error) {
                console.error('Forgot password error:', error);
                alert('Connection error: ' + error.message + '. Please ensure the backend server is running and accessible.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Send OTP';
            }
        }
    </script>
</body>

</html>
