<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendyn - Calendar</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 250px;
            --bg-light: #F8F8FF;
            --sidebar-bg: #FFFFFF;
            --active-item-bg: #F5F3FF;
            --active-item-text: #5E5CE6;
            --brand-purple: #7B61FF;
            --brand-blue: #5B6CFF;
            --text-heading: #1A1C3E;
            --text-sub: #545470;
            --btn-purple: #5E5CE6;
        }

        body {
            background-color: #F0F2FF;
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-heading);
            overflow-x: hidden;
        }

        .dashboard-container {
            display: flex;
            padding: 24px;
            gap: 24px;
            min-height: 100vh;
            background-color: #F0F2FF;
            box-sizing: border-box;
        }

        /* Content Styling */
        .main-content {
            flex: 1;
            background: #F5F3FF; /* Light Lavender Background */
            border-radius: 28px;
            height: calc(100vh - 48px);
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            align-items: center; /* Center horizontally */
            padding: 2.5rem;
            box-sizing: border-box;
        }

        .calendar-header-section { 
            width: 100%; 
            max-width: 480px; 
            margin-bottom: 2rem; 
        }

        .title-row { 
            display: flex; 
            flex-direction: column; /* Stacked on mobile/compact */
            align-items: center; 
            gap: 16px; 
            width: 100%; 
            text-align: center;
        }
        
        @media (min-width: 640px) {
            .title-row {
                flex-direction: row;
                justify-content: space-between;
                text-align: left;
            }
        }
        
        .subject-select-wrapper { min-width: 200px; }
        .subject-dropdown {
            width: 100%;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid #E5E7EB;
            font-family: inherit;
            font-weight: 600;
            color: #1A1C3E;
            background: #F9FAFB;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }
        .subject-dropdown:focus { border-color: var(--brand-blue); box-shadow: 0 0 0 4px rgba(91, 108, 255, 0.1); }

        .calendar-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #F1F3F9;
            padding: 1.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            margin-bottom: 1.5rem;
            box-sizing: border-box;
        }

        .calendar-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .nav-btn {
            width: 36px; height: 36px;
            border-radius: 10px;
            border: 1px solid #F1F3F9;
            background: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #545470;
        }
        .nav-btn:hover { background: #F9FAFB; color: var(--brand-blue); }

        .month-name {
            font-size: 1.25rem;
            font-weight: 800;
            color: #1A1C3E;
            margin: 0;
        }

        .calendar-grid-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 0.7rem;
            font-weight: 800;
            color: #A0AABF;
            letter-spacing: 1px;
            margin-bottom: 0.75rem;
            gap: 10px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px; /* Reduced gap for better centered look */
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px; /* Good looking squircle/rounded square shape */
            font-weight: 700;
            font-size: 0.9rem;
            color: #1A1C3E;
            background: transparent;
            cursor: default;
            transition: all 0.2s;
            position: relative;
        }

        .calendar-day:not(.empty):not(.present):not(.absent):not(.partial) {
            background: #F9FAFB;
        }

        .calendar-day.present {
            background: #4CAF50;
            color: white;
        }

        .calendar-day.absent {
            background: #F44336;
            color: white;
        }

        .calendar-day.partial {
            background: #FBC02D; /* Dark Yellow */
            color: #1A1C3E; 
        }

        .calendar-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 1rem;
            width: 100%;
            max-width: 480px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 800;
            color: #545470;
        }
        .dot { width: 12px; height: 12px; border-radius: 4px; }
        .dot.present { background: #4CAF50; }
        .dot.absent { background: #F44336; }
        .dot.partial { background: #FBC02D; }

        .screen-title { font-size: 2rem; font-weight: 800; margin: 0; color: #1A1C3E; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .dashboard-container { padding: 0; }
            .main-content { height: 100vh; border-radius: 0; padding: 1.5rem; }
            .calendar-card { padding: 1.5rem; border-radius: 20px; }
            .bottom-nav { display: flex; }
        }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 80px;
            background: white;
            display: none;
            align-items: center;
            justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .m-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #A0AABF;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .m-nav-item.active { color: var(--brand-blue); }
        .m-nav-item svg { width: 24px; height: 24px; }

        .m-fab {
            width: 56px; height: 56px;
            background: var(--brand-purple);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; margin-top: -30px;
            box-shadow: 0 8px 20px rgba(123, 97, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo-icon">
                    <img src="../assets/logo.png?v=3" alt="Attendyn Logo">
                </div>
                <span class="logo-text">Attendyn</span>
            </div>
            
            <nav class="nav-group">
                <div class="nav-group-title">Menu</div>
                <a href="javascript:void(0)" onclick="navigateTo('dashboard.html')" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <span>Home</span>
                </a>
                <a href="javascript:void(0)" onclick="navigateTo('calendar.html')" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    <span>Calendar</span>
                </a>
                <a href="javascript:void(0)" onclick="navigateTo('analysis.html')" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                    <span>Analysis</span>
                </a>
                <a href="javascript:void(0)" onclick="navigateTo('add-attendance.html')" class="nav-item">
                    <div class="add-attendance-sidebar-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </div>
                    <span>Add Attendance</span>
                </a>
            </nav>

            <nav class="nav-group" style="margin-top: auto;">
                <div class="nav-group-title">Support</div>
                <a href="javascript:void(0)" onclick="navigateTo('profile.html')" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span>Profile</span>
                </a>
                <a href="javascript:void(0)" onclick="logout()" class="nav-item logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="calendar-header-section" id="calendarHeader">
                <div class="title-row">
                    <h1 class="screen-title text-left">Calendar</h1>
                    <div class="subject-select-wrapper" id="subjectSelectWrapper">
                        <select id="subject-selector" class="subject-dropdown">
                            <option value="">Select Subject</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display: none; text-align: center; padding: 3rem 1.5rem;">
                <div class="empty-icon" style="width: 80px; height: 80px; background: #F5F3FF; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem auto; color: #7B61FF;">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M19,3h-1V1h-2v2H8V1H6v2H5C3.9,3,3,3.9,3,5v14c0,1.1,0.9,2,2,2h14c1.1,0,2,-0.9,2,-2V5C21,3.9,20.1,3,19,3z M19,19H5V8h14V19z" /></svg>
                </div>
                <h2 style="font-size: 1.5rem; font-weight: 800; color: #1A1C3E; margin-bottom: 0.75rem;">No Attendance Data Available</h2>
                <p style="color: #545470; font-weight: 600; margin-bottom: 2rem;">Add subjects to start tracking attendance</p>
                <a href="javascript:void(0)" onclick="navigateTo('add-subject.html')" class="add-subject-empty-btn" style="background: var(--brand-purple); color: white; padding: 1rem 2rem; border-radius: 100px; font-weight: 700; display: inline-block; box-shadow: 0 8px 20px rgba(123, 97, 255, 0.3); text-decoration: none;">+ Add Subject</a>
            </div>

            <div class="calendar-card" id="calendarCard">
                <div class="calendar-nav">
                    <button id="prev-month" class="nav-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    <h2 id="current-month-display" class="month-name">March 2024</h2>
                    <button id="next-month" class="nav-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>

                <div class="calendar-grid-header">
                    <span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
                </div>
                <div id="calendar-grid" class="calendar-grid">
                    <!-- Days will be injected here -->
                </div>
            </div>

            <div class="calendar-legend" id="calendarLegend">
                <div class="legend-item"><span class="dot present"></span> Present</div>
                <div class="legend-item"><span class="dot absent"></span> Absent</div>
                <div class="legend-item"><span class="dot partial"></span> Mixed</div>
            </div>
        </main>

        <!-- Bottom Navigation (Mobile Only) -->
        <nav class="bottom-nav">
            <a href="javascript:void(0)" onclick="navigateTo('dashboard.html')" class="m-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>Home</span>
            </a>
            <a href="javascript:void(0)" onclick="navigateTo('calendar.html')" class="m-nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span>Calendar</span>
            </a>
            <a href="javascript:void(0)" onclick="navigateTo('add-attendance.html')" class="m-nav-item">
                <div class="m-fab"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></div>
            </a>
            <a href="javascript:void(0)" onclick="navigateTo('analysis.html')" class="m-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                <span>Analysis</span>
            </a>
            <a href="javascript:void(0)" onclick="navigateTo('profile.html')" class="m-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <script src="../js/app.js"></script>
    <script>
        let currentDate = new Date();
        let subjects = JSON.parse(localStorage.getItem('SUBJECTS_DATA') || '[]');
        let selectedSubjectId = null;

        async function init() {
            // Initial render from local cache for speed
            updateUIState();

            // Fetch latest data from API
            await fetchSubjects();
            
            document.getElementById('prev-month').onclick = () => {
                currentDate.setDate(1); // Set to 1st to avoid overflow mid-month
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            };
            
            document.getElementById('next-month').onclick = () => {
                currentDate.setDate(1); // Set to 1st to avoid overflow mid-month
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            };
            
            document.getElementById('subject-selector').onchange = (e) => {
                selectedSubjectId = e.target.value;
                renderCalendar();
            };
        }

        async function fetchSubjects() {
            const token = localStorage.getItem('AUTH_TOKEN');
            if (!token) return;

            try {
                const response = await fetch(`${API_BASE_URL}/subjects`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok) {
                    subjects = data;
                    localStorage.setItem('SUBJECTS_DATA', JSON.stringify(subjects));
                    updateUIState();
                }
            } catch (error) {
                console.error('Fetch subjects error:', error);
            }
        }

        function updateUIState() {
            if (subjects.length === 0) {
                document.getElementById('subjectSelectWrapper').style.display = 'none';
                document.getElementById('calendarCard').style.display = 'none';
                document.getElementById('calendarLegend').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
                return;
            }

            document.getElementById('subjectSelectWrapper').style.display = 'block';
            document.getElementById('calendarCard').style.display = 'block';
            document.getElementById('calendarLegend').style.display = 'flex';
            document.getElementById('emptyState').style.display = 'none';

            populateSubjectSelector();
            renderCalendar();
        }

        function populateSubjectSelector() {
            const selector = document.getElementById('subject-selector');
            const currentVal = selector.value;
            selector.innerHTML = ''; // Clear to prevent duplicates on refresh
            
            subjects.forEach(subject => {
                const option = document.createElement('option');
                option.value = subject.id;
                option.textContent = subject.name;
                selector.appendChild(option);
            });
            
            if (currentVal && subjects.find(s => String(s.id) === String(currentVal))) {
                selector.value = currentVal;
                selectedSubjectId = currentVal;
            } else if (subjects.length > 0) {
                selectedSubjectId = subjects[0].id;
                selector.value = selectedSubjectId;
            }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthDisplay = document.getElementById('current-month-display');
            
            grid.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const monthName = new Intl.DateTimeFormat('en-US', { month: 'long' }).format(currentDate);
            monthDisplay.textContent = `${monthName} ${year}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Empty slots for previous month
            for (let i = 0; i < firstDay; i++) {
                const div = document.createElement('div');
                div.className = 'calendar-day empty';
                grid.appendChild(div);
            }
            
            // Current month days
            const selectedSubject = subjects.find(s => String(s.id) === String(selectedSubjectId));
            const history = selectedSubject?.attendanceHistory || selectedSubject?.history || {};
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const status = history[dateKey];
                
                const div = document.createElement('div');
                div.className = 'calendar-day';
                div.textContent = i;
                
                if (status == 1) div.classList.add('present');
                else if (status == 2) div.classList.add('absent');
                else if (status == 3) div.classList.add('partial');
                
                grid.appendChild(div);
            }
        }

        function navigateTo(page) {
            window.location.href = page;
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            init();
        });
    </script>
</body>
</html>
